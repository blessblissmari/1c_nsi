name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend deps
        working-directory: backend
        run: |
          pip install -U pip
          pip install -r requirements-dev.txt
      - name: Ruff check
        working-directory: backend
        run: ruff check .
      - name: Ruff format --check
        working-directory: backend
        run: ruff format --check .
      - name: Mypy
        working-directory: backend
        run: mypy app || true  # не блокируем CI при первичной настройке

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend deps
        working-directory: backend
        run: |
          pip install -U pip
          pip install -r requirements-dev.txt
      - name: Run pytest
        working-directory: backend
        env:
          APP_ENV: test
          DATABASE_URL: "sqlite:///./test.db"
          JWT_SECRET_KEY: "test-secret"
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: nsi-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: nsi-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
