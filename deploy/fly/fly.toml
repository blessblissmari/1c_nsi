# Fly.io конфиг для бэкенда «Инструмент НСИ».
# Деплой:
#   1. curl -L https://fly.io/install.sh | sh
#   2. fly auth login
#   3. fly launch --no-deploy --copy-config --config deploy/fly/fly.toml --dockerfile backend/Dockerfile
#   4. fly volumes create nsi_data --size 1 --region fra
#   5. fly secrets set JWT_SECRET_KEY="$(python -c 'import secrets; print(secrets.token_urlsafe(64))')" \
#        YANDEX_API_KEY=... YANDEX_IDENTIFICATOR=... MODEL_URL=... VECTOR_STORE_IDENTIFICATOR=... \
#        CORS_ORIGINS="https://<user>.github.io"
#   6. fly deploy

app = "nsi-backend"
primary_region = "fra"

[build]
  dockerfile = "../../backend/Dockerfile"

[env]
  APP_ENV = "production"
  DEBUG = "false"
  LOG_LEVEL = "INFO"
  PORT = "8000"
  DATABASE_URL = "sqlite:////data/nsi.db"
  UPLOAD_DIR = "/data/uploads"
  MAX_UPLOAD_MB = "50"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/v1/health"

[[mounts]]
  source = "nsi_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
