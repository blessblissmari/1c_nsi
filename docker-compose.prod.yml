services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: always
    environment:
      APP_ENV: production
      DEBUG: "false"
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS}
      YANDEX_API_KEY: ${YANDEX_API_KEY:-}
      YANDEX_IDENTIFICATOR: ${YANDEX_IDENTIFICATOR:-}
      MODEL_URL: ${MODEL_URL:-}
      VECTOR_STORE_IDENTIFICATOR: ${VECTOR_STORE_IDENTIFICATOR:-}
      MINERU_API_KEY: ${MINERU_API_KEY:-}
      MAX_UPLOAD_MB: "50"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/app/uploads
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  backend_uploads:
