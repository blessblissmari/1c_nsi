services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nsi
      POSTGRES_PASSWORD: nsi
      POSTGRES_DB: nsi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nsi"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: development
      DEBUG: "true"
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+psycopg2://nsi:nsi@postgres:5432/nsi
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-change-me}
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
      YANDEX_API_KEY: ${YANDEX_API_KEY:-}
      YANDEX_IDENTIFICATOR: ${YANDEX_IDENTIFICATOR:-}
      MODEL_URL: ${MODEL_URL:-}
      VECTOR_STORE_IDENTIFICATOR: ${VECTOR_STORE_IDENTIFICATOR:-}
      MINERU_API_KEY: ${MINERU_API_KEY:-}
      MAX_UPLOAD_MB: "50"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/app/uploads

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  backend_uploads:
