# Render.com Blueprint для «Инструмент НСИ».
# Применить: https://render.com/deploy?repo=https://github.com/blessblissmari/1c_nsi
# NB: Бесплатный тариф web-сервиса Render убрали в 2024 — нужен план от $7/мес.
# Используйте fly.toml / HuggingFace Spaces, если бесплатный бэкенд критичен.

services:
  - type: web
    name: nsi-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    region: frankfurt
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: PORT
        value: "8000"
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: nsi-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_TTL_MINUTES
        value: "1440"
      - key: MAX_UPLOAD_MB
        value: "50"
      - key: YANDEX_API_KEY
        sync: false
      - key: YANDEX_IDENTIFICATOR
        sync: false
      - key: MODEL_URL
        sync: false
      - key: VECTOR_STORE_IDENTIFICATOR
        sync: false

databases:
  - name: nsi-db
    databaseName: nsi
    user: nsi
    plan: starter
    region: frankfurt
